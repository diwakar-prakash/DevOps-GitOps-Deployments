apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: "{{ .Values.gateway.image }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: {{ .Values.gateway.port }}

          env:
            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_NAME

            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: SECRET_KEY

          startupProbe:
            httpGet:
              path: /health
              port: {{ .Values.gateway.port }}
            failureThreshold: 40
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.gateway.port }}
            initialDelaySeconds: 0
            periodSeconds: 10

          readinessProbe: 
            httpGet:
              path: /ready
              port: {{ .Values.gateway.port }}
            initialDelaySeconds: 0
            periodSeconds: 5


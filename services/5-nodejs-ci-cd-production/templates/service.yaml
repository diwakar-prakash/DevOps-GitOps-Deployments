apiVersion: v1
kind: Service
metadata:
  name: {{ include "5-nodejs-ci-cd-production.fullname" . }}
  labels:
    {{- include "5-nodejs-ci-cd-production.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "5-nodejs-ci-cd-production.selectorLabels" . | nindent 4 }}
